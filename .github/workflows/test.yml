name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: bash + node versions
        run: bash --version | head -1; node --version
      - name: run test suite
        run: bash test.sh
