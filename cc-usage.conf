# ============================================================
#  cc-usage-statusline config — edit THIS file (no JSON needed)
#  Format: KEY=value (one per line). Lines starting with # are comments.
#  Save, then trigger any statusline refresh (e.g. type a message) to apply.
#  For the same KEY, the FIRST active line wins — enable only one.
# ============================================================

# === What to show / how many rows ========================
#   ,  = side by side on one line   ;  = new line
#   items: 5h 7d (Claude Code) · cx5h cx7d (Codex) · ctx model cost
CC_USAGE_SEGMENTS=5h,7d
#   ↓ uncomment ONE to switch (and comment the line above)
# CC_USAGE_SEGMENTS=5h,7d;cx5h,cx7d          # Claude Code row + Codex row (2 lines)
# CC_USAGE_SEGMENTS=5h;7d                      # one item per line
# CC_USAGE_SEGMENTS=5h,7d;cx5h,cx7d;ctx,cost  # add context % and session cost

# === Labels (fully customizable) =========================
#   head = [provider tag] [window tag]   e.g. default "CC 5h", custom "✿ 5h"
#   Defaults are plain text. Put any text or emoji. Empty = omit that slot.
# CC_USAGE_TAG_CC=CC          # Claude Code provider label  (try: ✿  🟧  🅰)
# CC_USAGE_TAG_CX=Cx          # Codex provider label        (try: ☁  🟦  🟣)
# CC_USAGE_TAG_5H=5h          # 5-hour window label         (try: ⏳)
# CC_USAGE_TAG_7D=7d          # weekly window label         (try: 📅)
# CC_USAGE_TAG_CTX=ctx        # context label               (try: 🧠)
#   Color a monochrome symbol tag (✿ ☁) — name or 256-color index.
#   (Color emoji like 🟧 ignore this; they carry their own color.)
# CC_USAGE_TAGCOLOR_CC=orange
# CC_USAGE_TAGCOLOR_CX=purple

# === Reset display =======================================
#   relative = time left (4h00m) / clock = wall time (→18:40) / both
CC_USAGE_RESET=relative

# === Appearance ==========================================
CC_USAGE_BARS=10            # number of bar cells
CC_USAGE_WARN=50            # yellow at/above this %
CC_USAGE_CRIT=80            # red at/above this %
# CC_USAGE_STYLE=ascii      # render bars as #,- (terminals without ▰▱)
# NO_COLOR=1                # disable color
# CC_USAGE_DEBUG=1          # print what it parsed (config/data/codex) to stderr
# CC_USAGE_CODEX_DIR=~/.codex/sessions   # Codex session root (default shown)

# === Performance / freshness =============================
CC_USAGE_CACHE_TTL=2        # reuse last output for N seconds (skips Node on rapid
                            #   re-renders of the same session). 0 = always recompute.
CC_USAGE_STALE_MIN=30       # when Codex hasn't run in N minutes, collapse its rows into
                            #   a compact "Cx idle" tag appended after Claude Code.
                            #   0 = off (always show full Codex rows).
